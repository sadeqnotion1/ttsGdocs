<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>Docs to Speech</title>
</head>
<body>
  <main class="card">
    <header class="head">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5 6 9H3v6h3l5 4z" />
          <path d="M16 8a5 5 0 0 1 0 8" />
          <path d="M19.5 5a9 9 0 0 1 0 14" />
        </svg>
      </span>
      <div>
        <h1>Docs to Speech</h1>
        <p>Capture the open Google Doc as audio</p>
      </div>
    </header>

    <section class="controls">
      <label class="field">
        <span>Engine</span>
        <select id="engine">
          <option value="auto">Auto (offline, then online)</option>
          <option value="pyttsx3">Offline (pyttsx3)</option>
          <option value="gtts">Online (gTTS)</option>
        </select>
      </label>

      <label class="field">
        <span>Speed &middot; <b id="rateVal">175</b> wpm</span>
        <input id="rate" type="range" min="100" max="260" step="5" value="175" />
      </label>

      <label class="field">
        <span>Language</span>
        <input id="lang" type="text" value="en" spellcheck="false" />
      </label>
    </section>

    <button id="go" class="primary">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-14 9z" /></svg>
      Capture &amp; Generate
    </button>

    <p id="status" class="status" data-kind="info">Starting...</p>

    <audio id="player" controls hidden></audio>
    <a id="download" class="download" hidden download>Download audio</a>
  </main>
  <script src="popup.js"></script>
</body>
</html>
