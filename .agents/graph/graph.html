<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ttsGdocs — knowledge graph</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#0A0A14; color:#E5E7EB;
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  #hud { position:fixed; top:12px; left:12px; z-index:10; font-size:13px;
    background:rgba(20,20,32,.7); border:1px solid #2A2A3C; border-radius:10px;
    padding:10px 12px; backdrop-filter: blur(6px); }
  #hud b { color:#8B5CF6; }
  #empty { position:fixed; inset:0; display:flex; align-items:center;
    justify-content:center; color:#9CA3AF; font-size:15px; text-align:center; padding:24px; }
  canvas { display:block; width:100vw; height:100vh; cursor:grab; }
</style>
</head>
<body>
<div id="hud"><b>ttsGdocs</b> &middot; <span id="counts"></span></div>
<canvas id="c"></canvas>
<div id="empty" hidden>Graph is empty. Add nodes/edges to graph.json, then re-run render_graph.py.</div>
<script>
const DATA = {"meta": {"project": "ttsGdocs", "version": 1, "generated": "2026-06-25", "note": "Repo knowledge graph. Query it, never dump it whole. See README.md for schema + jq recipes."}, "nodes": [{"id": "run", "label": "run.sh / run.bat", "group": "backend", "kind": "file", "summary": "Thin launchers that exec backend/server.py."}, {"id": "backend/server.py", "label": "server.py", "group": "backend", "kind": "file", "summary": "Stdlib HTTP server: /health, /, POST /tts, CORS."}, {"id": "backend/server.py#Handler", "label": "Handler", "group": "backend", "kind": "function", "summary": "BaseHTTPRequestHandler: do_GET/do_POST/do_OPTIONS."}, {"id": "backend/tts_engine.py", "label": "tts_engine.py", "group": "backend", "kind": "file", "summary": "Pluggable TTS engines; import-guarded."}, {"id": "backend/tts_engine.py#synthesize", "label": "synthesize()", "group": "backend", "kind": "function", "summary": "Try engines in priority order; returns (path, engine)."}, {"id": "backend/tts_engine.py#available_engines", "label": "available_engines()", "group": "backend", "kind": "function", "summary": "Which engines import successfully right now."}, {"id": "backend/config.py", "label": "config.py", "group": "backend", "kind": "file", "summary": "HOST, PORT, OUTPUT_DIR, ENGINE_PRIORITY, defaults."}, {"id": "backend/output", "label": "output/", "group": "data", "kind": "file", "summary": "Generated audio files (git-ignored)."}, {"id": "pyttsx3", "label": "pyttsx3", "group": "data", "kind": "external", "summary": "Offline TTS engine (optional dep)."}, {"id": "gTTS", "label": "gTTS", "group": "data", "kind": "external", "summary": "Online Google TTS engine (optional dep)."}, {"id": "frontend/manifest.json", "label": "manifest.json", "group": "frontend", "kind": "file", "summary": "MV3 manifest: permissions, host_permissions, popup, content script."}, {"id": "frontend/popup.html", "label": "popup.html", "group": "frontend", "kind": "file", "summary": "Popup UI markup."}, {"id": "frontend/popup.css", "label": "popup.css", "group": "frontend", "kind": "file", "summary": "Dark glassmorphism styling."}, {"id": "frontend/popup.js", "label": "popup.js", "group": "frontend", "kind": "file", "summary": "Reads doc export, calls /tts, plays + downloads audio."}, {"id": "frontend/popup.js#fetchDocText", "label": "fetchDocText()", "group": "frontend", "kind": "function", "summary": "Fetches the Google Doc plain-text export."}, {"id": "frontend/popup.js#synthesize", "label": "synthesize()", "group": "frontend", "kind": "function", "summary": "POSTs text to the backend /tts endpoint."}, {"id": "frontend/content.js", "label": "content.js", "group": "frontend", "kind": "file", "summary": "In-page script: reports doc id / selection / title."}, {"id": "docs.google.com/export", "label": "Docs export (txt)", "group": "data", "kind": "external", "summary": "/document/d/<id>/export?format=txt"}], "edges": [{"source": "run", "target": "backend/server.py", "kind": "launches"}, {"source": "backend/server.py", "target": "backend/server.py#Handler", "kind": "calls"}, {"source": "backend/server.py", "target": "backend/config.py", "kind": "imports"}, {"source": "backend/server.py", "target": "backend/tts_engine.py", "kind": "imports"}, {"source": "backend/server.py#Handler", "target": "backend/tts_engine.py#synthesize", "kind": "calls"}, {"source": "backend/server.py#Handler", "target": "backend/tts_engine.py#available_engines", "kind": "calls"}, {"source": "backend/tts_engine.py", "target": "backend/config.py", "kind": "imports"}, {"source": "backend/tts_engine.py#synthesize", "target": "pyttsx3", "kind": "calls"}, {"source": "backend/tts_engine.py#synthesize", "target": "gTTS", "kind": "calls"}, {"source": "backend/tts_engine.py#synthesize", "target": "backend/output", "kind": "reads"}, {"source": "frontend/manifest.json", "target": "frontend/popup.html", "kind": "reads"}, {"source": "frontend/manifest.json", "target": "frontend/content.js", "kind": "reads"}, {"source": "frontend/popup.html", "target": "frontend/popup.js", "kind": "reads"}, {"source": "frontend/popup.html", "target": "frontend/popup.css", "kind": "reads"}, {"source": "frontend/popup.js", "target": "frontend/popup.js#fetchDocText", "kind": "calls"}, {"source": "frontend/popup.js", "target": "frontend/popup.js#synthesize", "kind": "calls"}, {"source": "frontend/popup.js", "target": "frontend/content.js", "kind": "messaging"}, {"source": "frontend/popup.js#fetchDocText", "target": "docs.google.com/export", "kind": "http"}, {"source": "frontend/popup.js#synthesize", "target": "backend/server.py", "kind": "http"}]};
const GROUP_COLORS = {backend:'#06B6D4', frontend:'#8B5CF6', data:'#22C55E', default:'#F59E0B'};
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const counts = document.getElementById('counts');
let W, H, DPR;
function resize(){ DPR = window.devicePixelRatio||1; W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W*DPR; canvas.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener('resize', resize); resize();

const nodes = (DATA.nodes||[]).map((n,i)=>({...n, x: W/2 + Math.cos(i)*120 + (Math.random()-.5)*40,
  y: H/2 + Math.sin(i)*120 + (Math.random()-.5)*40, vx:0, vy:0}));
const byId = Object.fromEntries(nodes.map(n=>[n.id,n]));
const edges = (DATA.edges||[]).filter(e=>byId[e.source]&&byId[e.target])
  .map(e=>({s: byId[e.source], t: byId[e.target], kind: e.kind||''}));
counts.textContent = nodes.length + ' nodes · ' + edges.length + ' edges';
if(!nodes.length){ document.getElementById('empty').hidden = false; }

function color(n){ return GROUP_COLORS[n.group] || GROUP_COLORS.default; }
let dragging=null, mx=0, my=0;
canvas.addEventListener('mousedown',e=>{ const n=pick(e); if(n){dragging=n; canvas.style.cursor='grabbing';} });
window.addEventListener('mousemove',e=>{ const r=canvas.getBoundingClientRect(); mx=e.clientX-r.left; my=e.clientY-r.top;
  if(dragging){ dragging.x=mx; dragging.y=my; dragging.vx=0; dragging.vy=0; } });
window.addEventListener('mouseup',()=>{ dragging=null; canvas.style.cursor='grab'; });
function pick(e){ const r=canvas.getBoundingClientRect(), px=e.clientX-r.left, py=e.clientY-r.top;
  return nodes.find(n=>(n.x-px)**2+(n.y-py)**2 < 144); }

function step(){
  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i], b=nodes[j]; let dx=a.x-b.x, dy=a.y-b.y; let d2=dx*dx+dy*dy||0.01;
    const f=2200/d2; const d=Math.sqrt(d2); dx/=d; dy/=d;
    a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f;
  }
  for(const e of edges){ let dx=e.t.x-e.s.x, dy=e.t.y-e.s.y; const d=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(d-90)*0.01; dx/=d; dy/=d; e.s.vx+=dx*f; e.s.vy+=dy*f; e.t.vx-=dx*f; e.t.vy-=dy*f; }
  for(const n of nodes){ if(n===dragging) continue; n.vx+=(W/2-n.x)*0.0008; n.vy+=(H/2-n.y)*0.0008;
    n.vx*=0.85; n.vy*=0.85; n.x+=n.vx; n.y+=n.vy; }
}
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(148,163,184,.25)'; ctx.lineWidth=1;
  for(const e of edges){ ctx.beginPath(); ctx.moveTo(e.s.x,e.s.y); ctx.lineTo(e.t.x,e.t.y); ctx.stroke(); }
  ctx.font='11px Inter, sans-serif'; ctx.textAlign='center';
  for(const n of nodes){ ctx.beginPath(); ctx.fillStyle=color(n); ctx.arc(n.x,n.y,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#CBD5E1'; ctx.fillText(n.label||n.id, n.x, n.y-10); }
}
function loop(){ for(let k=0;k<2;k++) step(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
